tasks.register('runCargoService', JavaExec) {
    group = 'application'
    description = 'Runs the CargoService application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'it.unibo.ctxcargoservice.MainCtxcargoserviceKt' 
}

// Run configuration for App 2 (e.g., IoPort Service)
tasks.register('runIoPort', JavaExec) {
    group = 'application'
    description = 'Runs the IoPort application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'ioport.IOPortServer'
}