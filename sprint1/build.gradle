tasks.withType(Copy).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

application {
	//Define the main class for the application.
    mainClassName    = 'it.unibo.ctxcargoservice.MainCtxcargoserviceKt'
}
 
 jar {
    println("building jar")
    duplicatesStrategy(DuplicatesStrategy.EXCLUDE)  //per via di locgback.xml quando si usa spring
    from sourceSets.main.allSource
    from('./') {
      include '*.pl'
      include '*.json'
    }
    manifest {
        attributes 'Main-Class': "$mainClassName"
    }
}

task dovesiamo {
    println("projectDir= $projectDir")  
    println("buildDir  = $buildDir")    
}

tasks.register('createIOPortStartScripts', CreateStartScripts) {
    mainClass.set('ioport.IOPortServer')
    applicationName = 'ioport'
    
    // FIXED: Assigned the lazy directory providers directly so Gradle tracks the input/output boundaries properly
    outputDir = layout.buildDirectory.dir("ioport-scripts").get().asFile
    
    // Gradle 8.6 compliant lazy classpath configuration
    classpath = objects.fileCollection().from(
        tasks.named('jar').flatMap { it.archiveFile },
        configurations.runtimeClasspath
    )
}

distributions {
    main {
        distributionBaseName = 'cargoservice'
        contents {
            from('./cargoservice.pl')
            from('./sysRules.pl')
        }
    }

    ioport {
        distributionBaseName = 'ioport'
        contents {
            into('bin') {
                // Now Gradle knows what 'createIOPortStartScripts' is
                from(tasks.named('createIOPortStartScripts'))
                fileMode = 0755
            }
            into('lib') {
                from(configurations.runtimeClasspath)
                from(tasks.named('jar'))
            }
        }
    }
}

task run0(type: JavaExec) {
    group = "Execution"
    description = "Run the main class with JavaExecTask"
    classpath = sourceSets.main.runtimeClasspath
    main = 'it.unibo.ctxvrqak.MainCtxvrqakKt'
}

